<svg
  xmlns="http://www.w3.org/2000/svg"
  width="64"
  height="64"
  viewBox="0 0 64 64"
  role="img"
  aria-labelledby="faviconTitle"
>
  <title id="faviconTitle">CoEd favicon</title>
  <defs>
    <linearGradient id="faviconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2430" />
      <stop offset="100%" stop-color="#31394a" />
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#faviconBg)" />

  <text
    x="32"
    y="34"
    fill="#edf2ff"
    font-family="'Noto Sans', 'DejaVu Sans', sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="0.4"
    text-anchor="middle"
    dominant-baseline="middle"
  >
    CoEd
  </text>
</svg>
