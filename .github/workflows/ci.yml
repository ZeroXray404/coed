name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint-format-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier
        run: npm runt format:check

      - name: Build project
        run: npm run build
